<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支店組織図</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <main class="workspace">
      <section class="panel panel-main">
        <div class="toolbar">
          <div class="toolbar-primary">
            <div>
              <p class="section-label">支店</p>
              <div class="branch-tabs" id="branchTabs" aria-label="表示範囲"></div>
            </div>
            <section class="branch-summary" id="branchSummary" aria-live="polite"></section>
          </div>
          <div class="toolbar-meta">
            <label class="search-box" for="memberSearch">
              <span>メンバー検索</span>
              <input id="memberSearch" type="search" placeholder="氏名・役職・部署で検索">
            </label>
          </div>
        </div>
        <p id="actionStatus" class="action-status" aria-live="polite"></p>

        <section class="org-chart-section org-chart-section-wide">
          <div class="section-header">
            <div>
              <h2 id="chartTitle">組織図</h2>
            </div>
          </div>
          <div class="chart-frame">
            <div id="orgChart" class="org-chart" aria-live="polite"></div>
          </div>
        </section>
      </section>

      <section class="panel panel-members">
        <details class="member-disclosure" id="memberDisclosure" open>
          <summary>
            <span class="member-summary-row">
              <span>メンバー</span>
              <button id="openCreateButton" type="button" class="secondary-button member-create-button">新規追加</button>
            </span>
          </summary>
          <section class="member-grid-section">
            <div id="memberGrid" class="member-grid" aria-live="polite"></div>
          </section>
        </details>
      </section>

      <section class="panel panel-create">
        <details class="profile-disclosure create-disclosure" id="profileCreator">
          <summary>
            <span class="create-summary-content">
              <span class="create-summary-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" focusable="false">
                  <path d="M12 5v14M5 12h14" />
                </svg>
              </span>
              <span>新規追加</span>
            </span>
          </summary>
          <p class="manage-hint" id="createParentHint"></p>
          <form id="createForm" class="edit-form">
            <label class="edit-field">
              <span>追加先</span>
              <select id="createOffice" required></select>
            </label>
            <label class="edit-field">
              <span>誰の下に追加</span>
              <select id="createParent" required></select>
            </label>
            <div class="edit-field edit-field-wide">
              <span>氏名</span>
              <div class="name-split-grid">
                <input id="createLastName" type="text" placeholder="苗字" required>
                <input id="createFirstName" type="text" placeholder="名前">
              </div>
            </div>
            <label class="edit-field">
              <span>役職</span>
              <select id="createTitle"></select>
            </label>
            <div class="edit-field role-toggle-field">
              <span>&nbsp;</span>
              <button id="createAddTitleButton" type="button" class="secondary-button role-add-button">兼務役職を追加</button>
            </div>
            <label class="edit-field" id="createTitleSecondaryField" hidden>
              <span>兼務役職</span>
              <select id="createTitleSecondary"></select>
            </label>
            <label class="edit-field">
              <span>所属</span>
              <select id="createDepartment"></select>
            </label>
            <label class="edit-field">
              <span>社員番号</span>
              <input id="createEmployeeNumber" type="text" inputmode="numeric" placeholder="社員番号">
            </label>
            <label class="edit-field edit-field-wide">
              <span>顔写真</span>
              <input id="createPhoto" type="file" accept="image/*">
            </label>
            <label class="edit-field">
              <span>年齢</span>
              <select id="createAge"></select>
            </label>
            <label class="edit-field">
              <span>入社年度</span>
              <select id="createJoinYear"></select>
            </label>
            <label class="edit-field">
              <span>勤続</span>
              <select id="createTenure"></select>
            </label>
            <div class="edit-actions">
              <button type="submit" class="primary-button">新規追加</button>
            </div>
          </form>
          <p id="createStatus" class="edit-status" aria-live="polite"></p>
        </details>
      </section>

      <aside class="panel panel-detail" id="profilePanel" aria-live="polite">
        <div id="profileEmpty" class="profile-empty"></div>

        <div id="profileContent" class="profile-content" hidden>
          <div class="profile-summary">
            <div class="profile-summary-main">
              <div class="profile-photo" id="profilePhoto" hidden>
                <img id="profilePhotoImage" alt="顔写真">
              </div>
              <h2 id="profileName"></h2>
              <button id="profileEditButton" type="button" class="secondary-button profile-edit-button">編集</button>
            </div>
          </div>

          <dl class="profile-simple-list">
            <div id="profilePersonInfoRow" class="profile-stat-grid profile-stat-grid-compact">
              <div class="profile-stat">
                <dt>所属</dt>
                <dd id="profileAffiliationValue"></dd>
              </div>
              <div class="profile-stat">
                <dt>役職</dt>
                <dd id="profileRoleValue"></dd>
              </div>
              <div class="profile-stat">
                <dt>社員番号</dt>
                <dd id="profileEmployeeNumberValue"></dd>
              </div>
              <div class="profile-stat">
                <dt>年齢</dt>
                <dd id="profileAgeValue"></dd>
              </div>
              <div class="profile-stat">
                <dt>勤続</dt>
                <dd id="profileTenureValue"></dd>
              </div>
              <div class="profile-stat">
                <dt>入社</dt>
                <dd id="profileJoinYearValue"></dd>
              </div>
            </div>
            <div class="profile-simple-wide" id="profileDescriptionRow">
              <dt id="profileDescriptionLabel">経歴</dt>
              <dd id="profileDescriptionValue" class="history-list"></dd>
            </div>
          </dl>

          <details class="profile-disclosure" id="profileEditor">
            <summary>編集</summary>
            <form id="profileForm" class="edit-form">
              <div class="edit-field edit-field-wide">
                <span>氏名</span>
                <div class="name-split-grid">
                  <input id="editLastName" type="text" placeholder="苗字" required>
                  <input id="editFirstName" type="text" placeholder="名前">
                </div>
              </div>
              <label class="edit-field">
                <span>役職</span>
                <select id="editTitle"></select>
              </label>
              <div class="edit-field role-toggle-field">
                <span>&nbsp;</span>
                <button id="editAddTitleButton" type="button" class="secondary-button role-add-button">兼務役職を追加</button>
              </div>
              <label class="edit-field" id="editTitleSecondaryField" hidden>
                <span>兼務役職</span>
                <select id="editTitleSecondary"></select>
              </label>
              <label class="edit-field">
                <span>所属</span>
                <select id="editDepartment"></select>
              </label>
              <label class="edit-field" id="editEmployeeNumberField">
                <span>社員番号</span>
                <input id="editEmployeeNumber" type="text" inputmode="numeric" placeholder="社員番号">
              </label>
              <label class="edit-field edit-field-wide" id="editPhotoField">
                <span>顔写真</span>
                <input id="editPhoto" type="file" accept="image/*">
              </label>
              <label class="edit-field" id="editAgeField">
                <span>年齢</span>
                <select id="editAge"></select>
              </label>
              <label class="edit-field" id="editJoinYearField">
                <span>入社年度</span>
                <select id="editJoinYear"></select>
              </label>
              <label class="edit-field" id="editTenureField">
                <span>勤続</span>
                <select id="editTenure"></select>
              </label>
              <div class="edit-field edit-field-wide" id="editHistoryField">
                <span id="editHistoryFieldLabel">経歴</span>
                <div id="editHistoryRows" class="history-editor"></div>
                <button id="addEditHistoryRow" type="button" class="secondary-button history-add-button">経歴を追加</button>
              </div>
              <div class="edit-actions">
                <button id="profileSaveButton" type="submit" class="primary-button">保存</button>
                <button id="deleteProfileButton" type="button" class="secondary-button danger-button">削除</button>
                <button id="closeEditPanel" type="button" class="secondary-button">閉じる</button>
              </div>
            </form>
            <p id="editStatus" class="edit-status" aria-live="polite"></p>
          </details>
        </div>
      </aside>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
